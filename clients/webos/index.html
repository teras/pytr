<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>PYTR</title>
    <script src="webOSTVjs/webOSTV.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111; color: #eee;
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            width: 1920px; height: 1080px; overflow: hidden;
        }
        .container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; padding: 40px;
        }
        h1 { font-size: 64px; margin-bottom: 12px; color: #e33; font-weight: 700; }
        .subtitle { font-size: 24px; color: #888; margin-bottom: 60px; }
        .status { font-size: 22px; color: #aaa; margin-bottom: 40px; min-height: 30px; }
        .status.error { color: #e55; }
        .server-list {
            list-style: none; width: 600px; max-height: 400px;
            overflow-y: auto; margin-bottom: 40px;
        }
        .server-item, .manual-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 28px; margin-bottom: 8px;
            background: #222; border-radius: 8px; border: 3px solid transparent;
            font-size: 24px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
        }
        .server-item:focus, .manual-row:focus, .manual-row input:focus, .manual-row button:focus {
            outline: none; border-color: #e33;
        }
        .server-item:focus, .server-item.focused { border-color: #e33; background: #2a1a1a; }
        .server-item .name { font-weight: 600; }
        .server-item .addr { color: #888; font-size: 20px; }
        .divider { color: #555; font-size: 20px; margin: 20px 0; }
        .manual-row { gap: 12px; }
        .manual-row input {
            flex: 1; background: #333; border: 2px solid #555; border-radius: 6px;
            color: #eee; font-size: 24px; padding: 12px 16px;
        }
        .manual-row input:focus { border-color: #e33; }
        .manual-row button {
            background: #e33; color: #fff; border: none; border-radius: 6px;
            font-size: 22px; padding: 12px 24px; cursor: pointer;
            border: 3px solid transparent;
        }
        .manual-row button:focus { border-color: #fff; outline: none; }
        .spinner {
            display: inline-block; width: 24px; height: 24px;
            border: 3px solid #555; border-top-color: #e33; border-radius: 50%;
            animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        #app-iframe {
            position: fixed; top: 0; left: 0; width: 1024px; height: 576px;
            border: none; background: #0f0f0f;
            transform: scale(1.875); transform-origin: top left;
        }
    </style>
</head>
<body>
    <div class="container" id="setup-screen">
        <h1>PYTR</h1>
        <p class="subtitle">Connect to your PYTR server</p>
        <p class="status" id="status"><span class="spinner"></span>Searching for servers...</p>

        <ul class="server-list" id="server-list"></ul>

        <p class="divider" id="divider-name">Device Name</p>

        <div class="manual-row" id="row-name">
            <input type="text" id="device-name" placeholder="LG TV" tabindex="0" value="">
        </div>

        <p class="divider" id="divider-manual">or enter server address manually</p>

        <div class="manual-row" id="row-manual">
            <input type="text" id="manual-ip" placeholder="192.168.1.100:8000" tabindex="0">
            <button id="manual-btn" tabindex="0">Connect</button>
        </div>
    </div>

    <script>
        (function () {
            var statusEl = document.getElementById('status');
            var listEl = document.getElementById('server-list');
            var manualInput = document.getElementById('manual-ip');
            var manualBtn = document.getElementById('manual-btn');
            var deviceNameInput = document.getElementById('device-name');
            var setupScreen = document.getElementById('setup-screen');

            var STORE_KEY = 'pytr-data';
            var store = (function () {
                try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
                catch (e) { return {}; }
            })();
            function saveStore() { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }

            var savedToken = store.token || '';
            var savedDeviceName = store.deviceName || 'LG TV';
            var currentServerUrl = store.url || '';
            var appIframe = null;

            deviceNameInput.value = savedDeviceName;

            // ── Entry point ──────────────────────────────────────────────────
            if (currentServerUrl && savedToken) {
                showIframe(currentServerUrl);
            } else {
                showDiscovery();
            }

            // ── Iframe management ────────────────────────────────────────────

            function showIframe(address) {
                currentServerUrl = address;
                setupScreen.classList.add('hidden');

                if (appIframe) appIframe.remove();
                appIframe = document.createElement('iframe');
                appIframe.id = 'app-iframe';
                var sep = address.indexOf('?') >= 0 ? '&' : '?';
                appIframe.src = address + sep + 'tv=webos';
                appIframe.allow = 'autoplay; fullscreen';
                document.body.appendChild(appIframe);
            }

            function destroyIframe() {
                if (appIframe) {
                    appIframe.remove();
                    appIframe = null;
                }
                savedToken = '';
                setupScreen.classList.remove('hidden');
            }

            // ── postMessage handlers from iframe ─────────────────────────────

            window.addEventListener('message', function (e) {
                if (!e.data || typeof e.data !== 'object') return;
                // Only accept messages from our iframe and correct origin
                if (!appIframe || e.source !== appIframe.contentWindow) return;
                if (currentServerUrl && e.origin !== new URL(currentServerUrl).origin) return;

                switch (e.data.type) {
                    case 'pytr-request-auth':
                        if (appIframe && appIframe.contentWindow) {
                            appIframe.contentWindow.postMessage(
                                { type: 'pytr-auth', token: savedToken || '', deviceName: savedDeviceName }, currentServerUrl
                            );
                        }
                        break;

                    case 'pytr-paired':
                        savedToken = e.data.token || '';
                        store.token = savedToken;
                        saveStore();
                        break;

                    case 'pytr-change-server':
                        destroyIframe();
                        store = {}; saveStore();
                        showDiscovery();
                        break;

                    case 'pytr-auth-expired':
                        savedToken = '';
                        store.token = '';
                        saveStore();
                        break;
                }
            });

            // ── Discovery screen ─────────────────────────────────────────────

            function showDiscovery() {
                listEl.classList.remove('hidden');
                document.getElementById('divider-name').classList.remove('hidden');
                document.getElementById('row-name').classList.remove('hidden');
                document.getElementById('divider-manual').classList.remove('hidden');
                document.getElementById('row-manual').classList.remove('hidden');
                setupScreen.classList.remove('hidden');
                discover();
            }

            function discover() {
                statusEl.innerHTML = '<span class="spinner"></span>Searching for servers...';
                statusEl.className = 'status';

                if (window.webOS && window.webOS.service) {
                    window.webOS.service.request('luna://onl.ycode.pytr.service', {
                        method: 'discover',
                        onSuccess: function (res) {
                            if (res.servers && res.servers.length > 0) {
                                showServers(res.servers);
                            } else {
                                statusEl.textContent = 'No servers found. Enter address manually.';
                            }
                        },
                        onFailure: function () {
                            statusEl.textContent = 'Discovery unavailable. Enter address manually.';
                        }
                    });
                } else {
                    statusEl.textContent = 'Not running on webOS. Enter address manually.';
                }
            }

            function showServers(servers) {
                statusEl.textContent = 'Found ' + servers.length + ' server' + (servers.length > 1 ? 's' : '') + ':';
                listEl.innerHTML = '';
                var inputReady = false;
                setTimeout(function () { inputReady = true; }, 800);
                servers.forEach(function (srv) {
                    var li = document.createElement('li');
                    li.className = 'server-item';
                    li.tabIndex = 0;
                    li.innerHTML = '<span class="name">' + escHtml(srv.Name || 'PYTR Server') + '</span>' +
                        '<span class="addr">' + escHtml(srv.Address) + '</span>';
                    li.addEventListener('click', function () { if (inputReady) connectTo(srv.Address); });
                    li.addEventListener('keydown', function (e) {
                        if (e.key === 'Enter' && inputReady) connectTo(srv.Address);
                    });
                    listEl.appendChild(li);
                });
            }

            manualBtn.addEventListener('click', manualConnect);
            manualInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') manualConnect();
            });

            function manualConnect() {
                var val = manualInput.value.trim();
                if (!val) return;
                if (!/^https?:\/\//.test(val)) val = 'http://' + val;
                connectTo(val);
            }

            function connectTo(address) {
                if (!/^https?:\/\//.test(address)) address = 'http://' + address;

                statusEl.innerHTML = '<span class="spinner"></span>Connecting...';
                statusEl.className = 'status';

                var timeout = setTimeout(function () {
                    statusEl.textContent = 'Connection timed out. Check the address.';
                    statusEl.className = 'status error';
                }, 8000);

                fetch(address + '/api/profiles/boot', { mode: 'cors' })
                    .then(function (r) {
                        clearTimeout(timeout);
                        if (!r.ok) throw new Error('Bad response');
                        return r.json();
                    })
                    .then(function () {
                        savedDeviceName = deviceNameInput.value.trim() || 'LG TV';
                        store.url = address;
                        store.deviceName = savedDeviceName;
                        saveStore();
                        showIframe(address);
                    })
                    .catch(function () {
                        clearTimeout(timeout);
                        statusEl.textContent = 'Could not connect to server. Check the address.';
                        statusEl.className = 'status error';
                    });
            }

            function escHtml(s) {
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            // Back button: if iframe visible, forward to iframe. Else exit app.
            document.addEventListener('keydown', function (e) {
                if (e.keyCode === 461) {
                    if (appIframe) {
                        appIframe.contentWindow.postMessage({ type: 'pytr-back' }, currentServerUrl);
                    } else if (window.webOS && window.webOS.platformBack) {
                        window.webOS.platformBack();
                    }
                }
            });
        })();
    </script>
</body>
</html>
