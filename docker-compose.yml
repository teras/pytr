services:
  pytr:
    build:
      context: .
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  discovery:
    build:
      context: .
      dockerfile: Dockerfile.discovery
    network_mode: host
    restart: unless-stopped
