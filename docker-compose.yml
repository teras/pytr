services:
  pytr:
    build:
      context: .
      args:
        BUILD_VERSION: "${BUILD_VERSION:-}"
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-}
      - FORYOU_URL=${FORYOU_URL:-http://foryou:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  discovery:
    build:
      context: .
      dockerfile: Dockerfile.discovery
    network_mode: host
    restart: unless-stopped

  cookie-beast:
    build: ./cookie-beast
    profiles: [cookies]
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      - USER=beast
      - COOKIES_INPUT=/data/cookies.txt
      - COOKIES_OUTPUT=/data/cookies.txt
      - MIN_INTERVAL=900
      - MAX_INTERVAL=3600
    shm_size: 2g

  foryou:
    build: ./foryou
    profiles: [foryou]
    restart: unless-stopped
    # No exposed port — accessed only via the PYTR reverse-proxy on the internal Docker network.
    volumes:
      - ./data:/app/data
    # Reach the shared Ollama LLM service running on the host (see Containers/ollama).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      # LLM backend: none | openai | ollama | llamacpp | api
      - FORYOU_LLM_BACKEND=${FORYOU_LLM_BACKEND:-openai}
      - FORYOU_EMBED_BACKEND=${FORYOU_EMBED_BACKEND:-openai}
      # OpenAI-compatible endpoint. Default: the shared Ollama service on the
      # host. Point at any /v1 endpoint — local server or remote provider.
      - FORYOU_LLM_BASE_URL=${FORYOU_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - FORYOU_LLM_MODEL=${FORYOU_LLM_MODEL:-gemma3:4b}
      - FORYOU_EMBED_MODEL=${FORYOU_EMBED_MODEL:-embeddinggemma}
      - FORYOU_LLM_API_KEY=${FORYOU_LLM_API_KEY:-}
      # Curated, privacy-gated cloud providers (only when FORYOU_LLM_BACKEND=api)
      - FORYOU_API_PROVIDER=${FORYOU_API_PROVIDER:-gemini}
      - FORYOU_API_KEY=${FORYOU_API_KEY:-}
      - FORYOU_API_MODEL=${FORYOU_API_MODEL:-}
      # Shared cookies file (read-only) — used by yt-dlp for Charts, search, Mixes.
      - FORYOU_COOKIES=/app/data/cookies.txt
