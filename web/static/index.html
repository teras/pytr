</head>

    <!-- Profile selector overlay -->
    <div id="profile-overlay"></div>

    <div class="container hidden">
        <header>
            <h1 class="logo-group"><a href="/" id="logo-link" class="logo-icon"><svg class="logo-outline" fill="#4d90fe"><use href="#pytr-outline"/></svg><img src="/static/pytr.svg" alt="PYTR" class="logo-img"></a><a href="/" class="logo-label" tabindex="-1">PYTR</a></h1>
            <div class="search-box">
                <input type="search" id="search-input" placeholder="&#x1F50D; Search videos..." enterkeyhint="search" autofocus>
            </div>
            <div class="header-right">
                <button id="profile-switcher-btn" class="profile-switcher-btn hidden"></button>
            </div>
        </header>

        <main>
            <!-- List View (Search / Channel) -->
            <div id="list-view">
                <div id="list-header" class="hidden">
                    <h2 id="list-title"></h2>
                    <div id="list-tabs" class="hidden">
                        <button class="list-tab" data-tab="discover">Discover</button>
                        <button class="list-tab" data-tab="favorites">Favorites</button>
                        <button class="list-tab" data-tab="history">History</button>
                    </div>
                    <span id="clear-list-btn" class="hidden">Clear history</span>
                </div>
                <div id="sub-tabs" class="hidden"></div>
                <div id="video-grid"></div>
                <div id="load-more-container" class="hidden"></div>
                <div id="no-results" class="hidden">
                    <p>No videos found.</p>
                </div>
            </div>

            <!-- Video Page View -->
            <div id="video-view" class="hidden">
                <div class="video-page-layout">
                    <!-- Left column: Player -->
                    <div class="video-main">
                        <div id="player-container">
                            <video id="video-player" autoplay playsinline webkit-playsinline></video>
                            <div id="tv-osd" class="tv-osd">
                                <div id="osd-chapter" class="osd-chapter"></div>
                                <span id="osd-play-icon" class="osd-play-icon"></span>
                                <span id="osd-current" class="tv-osd-time">0:00</span>
                                <div id="osd-bar" class="tv-osd-bar">
                                    <div id="osd-progress" class="tv-osd-progress"></div>
                                    <div id="osd-preview" class="osd-preview"></div>
                                    <span id="osd-seek-tooltip" class="osd-seek-tooltip"></span>
                                </div>
                                <span id="osd-total" class="tv-osd-time">0:00</span>
                                <div class="osd-right-controls">
                                    <div class="osd-volume-wrap">
                                        <button id="osd-volume-btn" class="osd-ctrl-btn" title="Volume">
                                            <svg id="osd-vol-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                                        </button>
                                        <div id="osd-volume-popup" class="osd-volume-popup">
                                            <input id="osd-volume-slider" type="range" min="0" max="100" value="100" orient="vertical">
                                        </div>
                                    </div>
                                    <button class="osd-ctrl-btn osd-mode-btn" data-action="theater" title="Theater mode">
                                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="none"><path d="M1.814 1.115a.51.51 0 0 0-.51.51v6.41c0 2.557.001 4.16.005 5.125.001.483.004.804.007 1.01l.006.23c.001.028.003.049.006.079.002.014.002.03.01.068.004.02.03.1.031.101l.088.137.135.108.25.062c.118 0 .089-.007.119-.012l.1-.015c.305-.054 1.967-.28 2.634-.354a55 55 0 0 1 1.807-.18 79 79 0 0 1 3.127-.201c.567-.024 1.91-.05 2.658-.05a67 67 0 0 1 10.05.763l.188.03.07.011c.021.003-.02.008.102.008l.256-.068.137-.116.056-.084s.022-.043.028-.058c.024-.062.025-.084.03-.106.007-.042.007-.064.009-.09.003-.05.006-.108.008-.195.004-.172.006-.45.008-.904.003-.908.005-2.51.005-5.299v-6.41a.51.51 0 0 0-.51-.51h-.052c-.059 0-.044 0-.063.002l-.072.006-.234.018-.727.058a120 120 0 0 1-6.058.332c-2.498.084-6.394.04-9.012-.101l-.942-.05a116 116 0 0 1-3.115-.222c-.136-.01-.265-.021-.365-.03l-.125-.009c-.033-.002-.03-.004-.094-.004zM21.381 3.01c.001.155.005.273.006.533.003.822.004 2.21.004 4.469v4.967a64 64 0 0 0-1.498-.188l-.412-.05a84 84 0 0 0-2.084-.194 71 71 0 0 0-2.067-.125c-2.894-.138-6.154-.072-8.896.183l-.659.061a77 77 0 0 0-2.518.295l-.11.016V8.01l.001-3.92c.001-.455.004-.802.004-1.078.031.002.024 0 .057.004.335.028.823.066 1.098.084h.002l1.125.07c2.37.15 4.977.217 7.58.197 1.835-.014 3.042-.043 4.603-.115a140 140 0 0 0 3.764-.242" transform="translate(-.27)"/><g fill="none" stroke="currentColor" stroke-width="1.73" stroke-linecap="round"><path d="M2 17.8h19"/><path d="M2 20.7h12"/></g></svg>
                                    </button>
                                    <button class="osd-ctrl-btn osd-mode-btn" data-action="normal" title="Normal mode">
                                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ddd" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"><g transform="translate(-.315 1.56)"><path d="M2.5 3.254c-.158 0-.246.088-.246.246v6c0 .158.088.246.246.246h11c.158 0 .246-.088.246-.246v-6c0-.158-.088-.246-.246-.246z" transform="matrix(1.10769 0 0 1.36354 -.676 -2.038)"/><path d="M1.74 18.505h6.98"/><path d="M1.857 15.427h11.987" style="stroke-width:1.73306"/><rect width="6" height="4" x="16.89" y="2" rx="1"/><rect width="6" height="4" x="16.89" y="8.44" rx="1"/><rect width="6" height="4" x="16.89" y="14.88" rx="1"/></g></svg>
                                    </button>
                                    <button class="osd-ctrl-btn osd-mode-btn" data-action="fullscreen" title="Fullscreen">
                                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                                    </button>
                                    <button class="osd-ctrl-btn osd-mode-btn" data-action="exit-fs" title="Exit Fullscreen">
                                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="video-details">
                            <div class="video-title-row">
                                <h2 id="video-title"></h2>
                                <a id="youtube-link" href="#" target="_blank" rel="noopener" class="youtube-link" title="Watch on YouTube">YouTube</a>
                                <label id="yt-time-toggle" class="yt-time-toggle" title="Include current time in link">
                                    <input type="checkbox" id="yt-time-check"><span>🕒</span>
                                </label>
                            </div>
                            <div class="video-info-row">
                                <div class="video-info-left">
                                    <a href="#" id="video-channel" class="channel-link"></a>
                                    <p id="video-meta"></p>
                                </div>
                                <div class="video-info-right">
                                    <button id="favorite-btn" class="player-btn hidden" onclick="toggleFavorite()">☆ Save</button>
                                    <div id="subtitle-btn-container" class="hidden">
                                        <button id="subtitle-btn" class="player-btn">💬 Off</button>
                                        <div id="subtitle-menu" class="subtitle-menu hidden"></div>
                                    </div>
                                    <div id="summarize-btn-container" class="hidden">
                                        <button id="summarize-btn" class="player-btn">TL;DW</button>
                                        <div id="summarize-menu" class="summarize-menu hidden"></div>
                                    </div>
                                    <div id="audio-btn-container" class="hidden">
                                        <button id="audio-btn" class="player-btn">🔊 Original</button>
                                        <div id="audio-menu" class="audio-menu hidden"></div>
                                    </div>
                                    <div id="quality-selector" class="quality-selector hidden">
                                        <button id="quality-btn" class="player-btn">🎬 1080p</button>
                                        <div id="quality-menu" class="quality-menu hidden"></div>
                                    </div>
                                    <button id="private-mode-btn-player" class="player-btn private-mode-player-btn hidden" title="Private mode (don't save to history)">
                                        <svg class="eye-open" width="16" height="16"><use href="#eye-open"/></svg>
                                        <svg class="eye-closed hidden" width="16" height="16"><use href="#eye-closed"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div id="video-description" class="video-description hidden"></div>
                        </div>
                    </div>

                    <!-- Right column: Queue + Related videos -->
                    <div class="video-sidebar">
                        <div id="queue-section" class="hidden">
                            <div class="queue-header">
                                <div class="queue-toggle-area" id="queue-toggle-area">
                                    <h3 id="queue-title">Queue</h3>
                                    <span id="queue-position"></span>
                                    <span id="queue-hide-indicator" class="queue-arrow">&#9660;</span>
                                </div>
                                <div class="queue-close-area" id="queue-close-area" title="Close queue">
                                    <span>&times;</span>
                                </div>
                            </div>
                            <div id="queue-list" class="queue-list"></div>
                        </div>
                        <h3>Related Videos</h3>
                        <div id="related-videos"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/auth-token.js"></script>
    <script src="/static/utilities.js"></script>
    <script src="/static/player.js"></script>
    <script src="/static/osd.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/search.js"></script>
    <script src="/static/subtitles.js"></script>
    <script src="/static/sponsorblock.js"></script>
    <script src="/static/pairing.js"></script>
    <script src="/static/profiles.js"></script>
    <script src="/static/remote.js"></script>
    <script src="/static/tv-nav.js"></script>
    <script src="/static/lounge.js"></script>
    <script src="/static/tv-overlays.js"></script>
    <script src="/static/foryou.js"></script>
    <script>(window._pytrWaitForToken ? window._pytrWaitForToken() : Promise.resolve()).then(checkProfile);</script>
</body>
</html>
