<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYTR</title>
    <link rel="icon" type="image/svg+xml" href="/static/pytr.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/dashjs@4/dist/dash.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <style>
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #player-wrap { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; }
        #error-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #aaa; font-size: 16px; display: none; text-align: center;
        }
        /* Hide theater/normal mode buttons in embed — only fullscreen */
        .osd-mode-btn[data-action="theater"],
        .osd-mode-btn[data-action="normal"] { display: none !important; }
        /* ── Embed controls bar (above OSD) ──────────────────────────────── */
        #embed-controls {
            position: absolute; bottom: 44px; right: 8px;
            display: flex; gap: 6px; pointer-events: auto;
            opacity: 0; transition: opacity 0.3s; z-index: 41;
        }
        .tv-osd.visible ~ #embed-controls { opacity: 1; }
        .embed-btn {
            background: rgba(0,0,0,.7); color: #fff; border: none; border-radius: 6px;
            padding: 4px 10px; font-size: 13px; cursor: pointer; position: relative;
            white-space: nowrap;
        }
        .embed-btn:hover { background: rgba(40,40,40,.9); }
        .embed-menu {
            display: none; position: absolute; bottom: 100%; right: 0; margin-bottom: 4px;
            background: rgba(20,20,20,.95); border-radius: 8px; padding: 4px 0;
            min-width: 120px; max-height: 260px; overflow-y: auto;
        }
        .embed-menu.open { display: block; }
        .embed-menu-item {
            padding: 6px 14px; font-size: 13px; color: #ccc; cursor: pointer;
            white-space: nowrap;
        }
        .embed-menu-item:hover { background: rgba(255,255,255,.1); }
        .embed-menu-item.selected { color: #fff; font-weight: 600; }
    </style>
</head>
<body>
    <div id="player-wrap">
        <video id="video"></video>
        <div id="tv-osd" class="tv-osd">
            <span id="osd-play-icon" class="osd-play-icon"></span>
            <span id="osd-current" class="tv-osd-time">0:00</span>
            <div id="osd-bar" class="tv-osd-bar">
                <div id="osd-progress" class="tv-osd-progress"></div>
                <div id="osd-preview" class="osd-preview"></div>
                <span id="osd-seek-tooltip" class="osd-seek-tooltip"></span>
            </div>
            <span id="osd-total" class="tv-osd-time">0:00</span>
            <div class="osd-right-controls">
                <div class="osd-volume-wrap">
                    <button id="osd-volume-btn" class="osd-ctrl-btn" title="Volume">
                        <svg id="osd-vol-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                    <div id="osd-volume-popup" class="osd-volume-popup">
                        <input id="osd-volume-slider" type="range" min="0" max="100" value="100" orient="vertical">
                    </div>
                </div>
                <button class="osd-ctrl-btn osd-mode-btn" data-action="theater" title="Theater mode">T</button>
                <button class="osd-ctrl-btn osd-mode-btn" data-action="normal" title="Normal mode">N</button>
                <button class="osd-ctrl-btn osd-mode-btn" data-action="fullscreen" title="Fullscreen">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
                <button class="osd-ctrl-btn osd-mode-btn" data-action="exit-fs" title="Exit Fullscreen">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
            </div>
        </div>
        <div id="embed-controls">
            <div>
                <button id="subtitle-btn" class="embed-btn" style="display:none"></button>
                <div id="subtitle-menu" class="embed-menu"></div>
            </div>
            <div>
                <button id="quality-btn" class="embed-btn"></button>
                <div id="quality-menu" class="embed-menu"></div>
            </div>
        </div>
        <div id="error-msg"></div>
    </div>
    <script src="/static/utilities.js"></script>
    <script src="/static/player.js"></script>
    <script src="/static/osd.js"></script>
    <script src="/static/embed.js"></script>
</body>
</html>
