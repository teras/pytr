services:
  pytr:
    build:
      context: .
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-}
      - FORYOU_URL=${FORYOU_URL:-http://foryou:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  discovery:
    build:
      context: .
      dockerfile: Dockerfile.discovery
    network_mode: host
    restart: unless-stopped

  cookie-beast:
    build: ./cookie-beast
    profiles: [cookies]
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      - USER=beast
      - COOKIES_INPUT=/data/cookies.txt
      - COOKIES_OUTPUT=/data/cookies.txt
      - MIN_INTERVAL=900
      - MAX_INTERVAL=3600
    shm_size: 2g

  ollama:
    # CPU default. For GPU acceleration run ./setup-foryou.sh once — it
    # autodetects NVIDIA/AMD/none and writes docker-compose.override.yml.
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    profiles: [foryou]
    restart: unless-stopped
    # No exposed port — only the foryou sidecar talks to it, on the internal Docker network.
    volumes:
      - ollama-models:/root/.ollama

  foryou:
    build: ./foryou
    profiles: [foryou]
    restart: unless-stopped
    depends_on:
      - ollama
    # No exposed port — accessed only via the PYTR reverse-proxy on the internal Docker network.
    volumes:
      - ./data:/app/data
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      # LLM backend: none | ollama | llamacpp | api
      - FORYOU_LLM_BACKEND=${FORYOU_LLM_BACKEND:-ollama}
      # Default: the bundled ollama sidecar on the internal network. Override only
      # if you want to point at a host install or a remote Ollama.
      - FORYOU_OLLAMA_URL=${FORYOU_OLLAMA_URL:-http://ollama:11434}
      - FORYOU_OLLAMA_MODEL=${FORYOU_OLLAMA_MODEL:-gemma3:4b}
      - FORYOU_OLLAMA_EMBED_MODEL=${FORYOU_OLLAMA_EMBED_MODEL:-embeddinggemma}
      # The foryou container pulls these models from Ollama on first boot if missing.
      - FORYOU_OLLAMA_AUTOPULL=${FORYOU_OLLAMA_AUTOPULL:-1}
      # Cloud LLM API (used only when FORYOU_LLM_BACKEND=api)
      - FORYOU_API_PROVIDER=${FORYOU_API_PROVIDER:-gemini}
      - FORYOU_API_KEY=${FORYOU_API_KEY:-}
      - FORYOU_API_MODEL=${FORYOU_API_MODEL:-}
      # Embedding backend: ollama | hash (deterministic fallback, lightweight)
      - FORYOU_EMBED_BACKEND=${FORYOU_EMBED_BACKEND:-ollama}
      # Shared cookies file (read-only) — used by yt-dlp for Charts, search, Mixes.
      - FORYOU_COOKIES=/app/data/cookies.txt

volumes:
  ollama-models:
