services:
  pytr:
    image: teras/pytr:latest
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  discovery:
    image: teras/pytr-discovery:latest
    network_mode: host
    restart: unless-stopped

  cookie-beast:
    image: teras/cookie-beast:latest
    profiles: [cookies]
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - PYTR_UID=${UID:-1000}
      - PYTR_GID=${GID:-1000}
      - USER=beast
      - COOKIES_INPUT=/data/cookies.txt
      - COOKIES_OUTPUT=/data/cookies.txt
      - MIN_INTERVAL=900
      - MAX_INTERVAL=3600
    shm_size: 2g
