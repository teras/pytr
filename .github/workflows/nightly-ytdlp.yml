name: yt-dlp Nightly Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for new yt-dlp version
        id: check
        run: |
          CURRENT=$(grep -oP 'yt-dlp\[default\]==\K[0-9.]+' web/requirements.txt)
          LATEST=$(curl -s https://pypi.org/pypi/yt-dlp/json | jq -r '.info.version')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
            echo "New yt-dlp available: $CURRENT → $LATEST"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
            echo "yt-dlp is up to date ($CURRENT)"
          fi

      - name: Update requirements.txt
        if: steps.check.outputs.update == 'true'
        run: |
          sed -i "s/yt-dlp\[default\]==${{ steps.check.outputs.current }}/yt-dlp[default]==${{ steps.check.outputs.latest }}/" web/requirements.txt

      # Dockerfile COPYs APK/IPK — create placeholders since we only care about yt-dlp here
      - name: Create placeholder client packages
        if: steps.check.outputs.update == 'true'
        run: mkdir -p build && touch build/pytr-tv.apk build/pytr-tv.ipk

      - uses: docker/setup-buildx-action@v4
        if: steps.check.outputs.update == 'true'

      - name: Build Docker image
        if: steps.check.outputs.update == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: pytr:nightly-test
          cache-from: type=gha,scope=nightly
          cache-to: type=gha,scope=nightly,mode=max

      - name: Smoke test — start server
        if: steps.check.outputs.update == 'true'
        run: |
          mkdir -p data
          docker run -d --name pytr-test -p 8000:8000 -v "$PWD/data:/app/data" pytr:nightly-test
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/profiles/boot > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Install ffmpeg
        if: steps.check.outputs.update == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Smoke test — verify extraction and play production path
        if: steps.check.outputs.update == 'true'
        run: |
          set -uo pipefail
          VIDEO_ID="dQw4w9WgXcQ"
          BASE="http://localhost:8000"

          # A genuine yt-dlp regression fails on every attempt (extraction
          # yields no formats), so retries only absorb transient datacenter
          # 403s on googlevideo — they can never mask a real break.
          retry() {
            local n=1 max=3
            while ! "$@"; do
              [ "$n" -ge "$max" ] && return 1
              echo "   attempt $n failed, retrying in 5s..."
              n=$((n+1)); sleep 5
            done
          }

          # 1. Extraction (metadata) — pure yt-dlp, fetches no googlevideo
          #    bytes, so it is IP-independent and the real regression detector.
          check_info() {
            local title
            title=$(curl -sf "$BASE/api/info/$VIDEO_ID" | jq -r '.title') || return 1
            [ -n "$title" ] && [ "$title" != "null" ] && echo "   Title: $title"
          }
          echo ":: [1/2] Extraction — /api/info"
          retry check_info || { echo "::error::extraction failed — yt-dlp regression"; exit 1; }

          # 2. DASH — the primary production path. Builds the MPD (adaptive
          #    format extraction + range-probe) and plays 5s through the
          #    chunked /api/videoplayback proxy that bypasses YouTube's
          #    per-connection throttle. This is exactly what users play.
          check_dash() {
            local mpd
            mpd=$(curl -sf "$BASE/api/dash/$VIDEO_ID") || return 1
            grep -q "<MPD" <<<"$mpd" || return 1
            grep -q "<Representation" <<<"$mpd" || return 1
            grep -q "/api/videoplayback" <<<"$mpd" || return 1
            timeout 60 ffmpeg -loglevel error -i "$BASE/api/dash/$VIDEO_ID" -t 5 -f null -
          }
          echo ":: [2/2] DASH playback — /api/dash (production path)"
          retry check_dash || { echo "::error::DASH production path failed"; exit 1; }

          echo "Smoke test passed!"

          # Progressive (22/18) is the last-resort proxy, NOT a gate: YouTube
          # intermittently 403s progressive formats from datacenter IPs, which
          # is environmental, not a yt-dlp regression. HLS is skipped too — a
          # single-audio VOD exposes no HLS manifest via the default client
          # (HLS is only used for multi-audio / live). Both are reported only.
          echo ":: (info) progressive /api/stream-live — non-fatal"
          if timeout 30 ffmpeg -loglevel error -i "$BASE/api/stream-live/$VIDEO_ID" -t 5 -f null -; then
            echo "   progressive OK"
          else
            echo "::warning::progressive stream-live failed (expected on datacenter IPs; not a regression)"
          fi

      - name: Cleanup test container
        if: always() && steps.check.outputs.update == 'true'
        run: docker rm -f pytr-test 2>/dev/null || true

      # Push image and commit only if tests passed
      - uses: docker/login-action@v4
        if: steps.check.outputs.update == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image as nightly
        if: steps.check.outputs.update == 'true'
        run: |
          docker tag pytr:nightly-test teras/pytr:nightly
          docker push teras/pytr:nightly

      - name: Commit to nightly branch
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B nightly
          git add web/requirements.txt
          git commit -m "update yt-dlp to ${{ steps.check.outputs.latest }}"
          git push -f origin nightly
